log_level: INFO
database_path: jobs.sqlite3
resume_profile_path: resume_profile.yaml

# Alert only jobs posted within this window. Jobs without exact post time are
# treated as fresh once, when first discovered.
posted_within_hours: 24

# Default schedule for local continuous mode. GitHub Actions uses its cron.
check_interval_minutes: 180

# Sends a short Telegram progress message after scraping/scoring finishes and
# before digest/status messages are evaluated.
send_phase_status:
  enabled: true

# Sends one Telegram "still running" summary at most once per interval.
heartbeat:
  enabled: true
  interval_hours: 24

# Sends one daily digest of promising jobs that are below the strict alert
# threshold, so you can manually review borderline roles.
near_match_digest:
  enabled: true
  interval_hours: 3
  max_items: 10
  min_overall: 55
  min_location: 70

actionable_digest:
  enabled: false
  interval_hours: 3
  max_items: 10
  exact_job_postings_only: true

new_actionable_alerts:
  enabled: true
  # Send every new exact Singapore tech internship that passes candidate filters,
  # even if it is below the stricter relevance threshold.
  min_overall: 0
  min_location: 70

exact_job_detection:
  exact_source_prefixes:
