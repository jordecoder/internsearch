manual_review_digest:
  enabled: true
  interval_hours: 24
  daily_at_sgt: "20:00"
  max_items: 20
  links:
    - label: Indeed Singapore - data engineer intern
      url: https://sg.indeed.com/jobs?q=data+engineer+intern&l=Singapore
      note: Indeed often blocks automation, so check this manually.
    - label: Indeed Singapore - machine learning intern
      url: https://sg.indeed.com/jobs?q=machine+learning+intern&l=Singapore
      note: Manual check for AI/ML internships.
    - label: Indeed Singapore - software engineer intern
      url: https://sg.indeed.com/jobs?q=software+engineer+intern&l=Singapore
      note: Manual check for SWE internships.
    - label: JobStreet Singapore - data engineer intern
      url: https://sg.jobstreet.com/data-engineer-intern-jobs/in-Singapore
      note: SEEK/JobStreet pages are dynamic; check manually.
    - label: JobStreet Singapore - software engineer intern
      url: https://sg.jobstreet.com/software-engineer-intern-jobs/in-Singapore
      note: Manual check for broad Singapore SWE internships.
    - label: JobsDB Singapore - technology intern
      url: https://sg.jobsdb.com/technology-intern-jobs/in-Singapore
      note: SEEK/JobsDB pages are dynamic; check manually.
    - label: FastJobs Singapore - IT intern
      url: https://www.fastjobs.sg/singapore-jobs/en/it-computers-internship-jobs
      note: Dynamic job board; check manually for smaller companies.
    - label: eFinancialCareers Singapore - technology intern
      url: https://www.efinancialcareers.sg/jobs-Technology-Internship-Singapore
      note: Useful for bank, fintech, and quant technology internships.
    - label: GradSingapore - technology internships
      url: https://gradsingapore.com/search-jobs?keywords=technology%20intern
      note: Graduate/internship board; review manually.
    - label: TalentTribe Singapore - tech internships
      url: https://talenttribe.asia/jobs
      note: Review manually for local internship postings.
    - label: MyCareersFuture - data engineer intern
      url: https://www.mycareersfuture.gov.sg/search?search=data%20engineer%20intern&sortBy=new_posting_date&page=0
      note: Dynamic page; review manually.
    - label: MyCareersFuture - AI intern
      url: https://www.mycareersfuture.gov.sg/search?search=ai%20intern&sortBy=new_posting_date&page=0
      note: Dynamic page; review manually.
    - label: Google Careers - Singapore internships
      url: https://www.google.com/about/careers/applications/jobs/results/?location=Singapore&q=intern
      note: Dynamic page; review manually.
    - label: Google Careers - data engineering Singapore
      url: https://www.google.com/about/careers/applications/jobs/results/?location=Singapore&q=data%20engineering
      note: Dynamic page; review manually.
    - label: LinkedIn Jobs - Singapore tech internships
      url: https://www.linkedin.com/jobs/search/?keywords=software%20engineer%20intern&location=Singapore
      note: Login-gated and dynamic; use saved alerts manually.
    - label: Careers@Gov - tech internships
      url: https://www.careers.gov.sg/
      note: Check GovTech, DSTA, HTX, IMDA, DSO, and other public-sector postings.
    - label: DSTA internships
      url: https://www.dsta.gov.sg/join-us/student/internships
      note: Programme page; verify current intake and deadline.
    - label: CSIT internships
      url: https://www.csit.gov.sg/join-us/internships
      note: Programme page; verify current intake and deadline.
    - label: AI Singapore opportunities
      url: https://aisingapore.org/careers/
      note: Check for AI, ML, data, and research engineering internships.
    - label: SGInnovate careers
      url: https://www.sginnovate.com/careers
      note: Check ecosystem and deep-tech roles.
    - label: NodeFlair Singapore internships
      url: https://nodeflair.com/jobs?query=intern&location=Singapore
      note: Dynamic job board; useful for tech-specific roles.
    - label: Glints Singapore tech internships
      url: https://glints.com/sg/opportunities/jobs/explore?keyword=software%20engineer%20intern
      note: Dynamic job board; review manually.
    - label: Prosple Singapore technology internships
      url: https://sg.prosple.com/search-jobs?keywords=technology%20intern
      note: Graduate/internship board; review manually.
    - label: Shopee Singapore internships
      url: https://careers.shopee.sg/jobs?keyword=intern
      note: Direct Shopee career search for Singapore internship openings.
    - label: Monee / SeaMoney Singapore internships
      url: https://www.sea.com/careers
      note: Sea fintech arm; check for Monee, SeaMoney, ShopeePay, SPayLater, SeaBank, and MariBank roles.
    - label: NUS TalentConnect
      url: https://nus-csm.symplicity.com/
      note: Login-gated university portal; check manually.
    - label: NTU InPlace
      url: https://inplace.ntu.edu.sg/
      note: Login-gated university portal; check manually.
    - label: SMU OnTRAC
      url: https://ontrac.smu.edu.sg/
      note: Login-gated university portal; check manually.

