# Local Kafka for development — no Zookeeper needed (KRaft mode, Kafka 3.x+)
#
# Start:   docker compose -f docker-compose.kafka.yml up -d
# Stop:    docker compose -f docker-compose.kafka.yml down
# UI:      http://localhost:8080
#
# Set in your .env:
#   KAFKA_BOOTSTRAP_SERVERS=localhost:9092
#   (leave KAFKA_API_KEY / KAFKA_API_SECRET unset for local plaintext)

version: "3.8"

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    container_name: internsearch-kafka
    ports:
      - "9092:9092"   # external (your Python scripts connect here)
      - "9101:9101"   # JMX
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168       # keep events for 7 days
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      # Unique cluster ID — required for KRaft; keep this fixed so data survives restarts
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - kafka_data:/var/lib/kafka/data

  # Web UI — browse topics, inspect messages, monitor consumer lag
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: internsearch-kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"

volumes:
  kafka_data:
