<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG Intern Watch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0f9ff', 100:'#e0f2fe', 500:'#0ea5e9', 600:'#0284c7', 700:'#0369a1' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .card-enter { animation: fadeSlideIn .25s ease both; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:9999px; font-size:.7rem; font-weight:600; letter-spacing:.03em; text-transform:uppercase; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
    .dark ::-webkit-scrollbar-thumb { background:#475569; }
  </style>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-200">

<!-- TOP NAV -->
<header class="sticky top-0 z-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur border-b border-slate-200 dark:border-slate-800">
  <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between gap-4">
    <div class="flex items-center gap-2">
      <span class="text-brand-600 dark:text-brand-500 text-xl">🎯</span>
      <span class="font-bold text-slate-800 dark:text-white tracking-tight">SG Intern Watch</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="last-updated" class="text-xs text-slate-400 dark:text-slate-500 hidden sm:block"></span>
      <button onclick="toggleDark()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition" title="Toggle theme">
        <svg id="icon-sun" class="w-4 h-4 text-slate-500 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
        <svg id="icon-moon" class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6">

  <!-- STATS ROW -->
  <div id="stats" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6"></div>

  <!-- FILTERS -->
  <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-4 mb-6 flex flex-wrap gap-3 items-center">
    <div class="relative flex-1 min-w-[180px]">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="search" type="text" placeholder="Search title, company…" oninput="applyFilters()"
        class="w-full pl-9 pr-4 py-2 text-sm rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 text-slate-900 dark:text-slate-100 placeholder-slate-400" />
    </div>

    <select id="filter-source" onchange="applyFilters()"
      class="text-sm rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500 text-slate-700 dark:text-slate-300">
      <option value="">All sources</option>
    </select>

    <select id="filter-actionable" onchange="applyFilters()"
      class="text-sm rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500 text-slate-700 dark:text-slate-300">
      <option value="">All jobs</option>
      <option value="actionable">Actionable only</option>
      <option value="notified">Notified only</option>
    </select>

    <select id="sort-by" onchange="applyFilters()"
      class="text-sm rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500 text-slate-700 dark:text-slate-300">
      <option value="newest">Newest first</option>
      <option value="score">Highest score</option>
      <option value="company">Company A→Z</option>
    </select>

    <span id="result-count" class="text-sm text-slate-400 dark:text-slate-500 whitespace-nowrap ml-auto"></span>
  </div>

  <!-- JOB LIST -->
  <div id="job-list" class="space-y-3"></div>

  <!-- EMPTY STATE -->
  <div id="empty-state" class="hidden text-center py-20 text-slate-400 dark:text-slate-600">
    <div class="text-5xl mb-4">🔍</div>
    <p class="text-lg font-medium">No jobs match your filters</p>
    <p class="text-sm mt-1">Try adjusting your search or filters</p>
  </div>

  <!-- LOADING -->
  <div id="loading" class="flex flex-col items-center justify-center py-24 text-slate-400">
    <svg class="animate-spin w-8 h-8 mb-4 text-brand-500" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
    </svg>
    <p class="text-sm">Loading job data…</p>
  </div>

  <!-- ERROR -->
  <div id="error-state" class="hidden text-center py-20">
    <div class="text-5xl mb-4">⚠️</div>
    <p class="text-lg font-medium text-slate-600 dark:text-slate-400">Could not load job data</p>
    <p class="text-sm text-slate-400 mt-1">Make sure the GitHub Actions workflow has run at least once and GitHub Pages is enabled.</p>
  </div>
</main>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let ALL_JOBS = [];

// ── Dark mode ────────────────────────────────────────────────────────────────
function toggleDark() {
  const dark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  document.getElementById('icon-sun').classList.toggle('hidden', !dark);
  document.getElementById('icon-moon').classList.toggle('hidden', dark);
}
(function initTheme() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const dark = saved ? saved === 'dark' : prefersDark;
  if (dark) document.documentElement.classList.add('dark');
  document.getElementById('icon-sun').classList.toggle('hidden', !dark);
  document.getElementById('icon-moon').classList.toggle('hidden', dark);
})();

// ── Helpers ──────────────────────────────────────────────────────────────────
function relativeTime(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
  return new Date(iso).toLocaleDateString('en-SG', { day:'numeric', month:'short' });
}

function sourceLabel(src) {
  if (!src) return 'Unknown';
  const parts = src.split(':');
  return parts.length > 1 ? parts[0] : src;
}

function sourceBadgeClass(src) {
  const label = sourceLabel(src).toLowerCase();
  const map = {
    greenhouse:  'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400',
    lever:       'bg-violet-100 text-violet-700 dark:bg-violet-900/40 dark:text-violet-400',
    ashby:       'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/40 dark:text-cyan-400',
    linkedin:    'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400',
    careerspage: 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-400',
    internsg:    'bg-orange-100 text-orange-700 dark:bg-orange-900/40 dark:text-orange-400',
    smartrecruiters: 'bg-pink-100 text-pink-700 dark:bg-pink-900/40 dark:text-pink-400',
  };
  return map[label] || 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400';
}

function scoreRingClass(s) {
  if (s >= 80) return 'text-emerald-600 dark:text-emerald-400';
  if (s >= 65) return 'text-amber-500 dark:text-amber-400';
  return 'text-slate-400 dark:text-slate-500';
}

function statCard(label, value, sub, color) {
  return `
  <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-4">
    <p class="text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide">${label}</p>
    <p class="text-2xl font-bold mt-1 ${color}">${value}</p>
    ${sub ? `<p class="text-xs text-slate-400 mt-0.5">${sub}</p>` : ''}
  </div>`;
}

// ── Render stats ─────────────────────────────────────────────────────────────
function renderStats(jobs, exportedAt) {
  const total = jobs.length;
  const actionable = jobs.filter(j => j.actionable).length;
  const notified = jobs.filter(j => j.notified).length;
  const sources = [...new Set(jobs.map(j => sourceLabel(j.source)))].length;
  const oneDayAgo = Date.now() - 86400000;
  const newToday = jobs.filter(j => new Date(j.first_seen_time).getTime() > oneDayAgo).length;

  document.getElementById('stats').innerHTML =
    statCard('Total scraped', total, `last ${window._DAYS_BACK || 14} days`, 'text-slate-800 dark:text-white') +
    statCard('New today', newToday, 'past 24 hours', 'text-brand-600 dark:text-brand-500') +
    statCard('Actionable', actionable, 'pass all filters', 'text-emerald-600 dark:text-emerald-400') +
    statCard('Notified', notified, 'sent to Telegram', 'text-violet-600 dark:text-violet-400');

  if (exportedAt) {
    document.getElementById('last-updated').textContent = `Updated ${relativeTime(exportedAt)}`;
  }
}

// ── Populate source filter ────────────────────────────────────────────────────
function populateSourceFilter(jobs) {
  const sources = [...new Set(jobs.map(j => sourceLabel(j.source)))].sort();
  const sel = document.getElementById('filter-source');
  sources.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  });
}

// ── Render a single job card ─────────────────────────────────────────────────
function renderCard(job) {
  const score = job.score || {};
  const overall = score.overall ?? 0;
  const src = sourceLabel(job.source);
  const companyName = job.source?.includes(':') ? job.source.split(':')[1] : (job.company || '');

  const notifiedBadge = job.notified
    ? `<span class="badge bg-violet-100 text-violet-700 dark:bg-violet-900/40 dark:text-violet-400">✓ Notified</span>`
    : '';
  const actionableBadge = job.actionable && !job.notified
    ? `<span class="badge bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400">✦ Actionable</span>`
    : '';

  const scoreTooltip = score.overall != null
    ? `Role ${score.role} · Skill ${score.skill} · Loc ${score.location} · Timeline ${score.timeline}`
    : '';

  const timelineTag = score.timeline_match && score.timeline_match !== 'Newly discovered, timeline unspecified' && score.timeline_match !== 'Recent posting, timeline unspecified'
    ? `<span class="badge bg-sky-100 text-sky-700 dark:bg-sky-900/40 dark:text-sky-400">${score.timeline_match}</span>`
    : '';

  const postedLabel = job.posted_time
    ? `Posted ${relativeTime(job.posted_time)}`
    : `Seen ${relativeTime(job.first_seen_time)}`;

  return `
  <div class="card-enter bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-4 hover:border-brand-300 dark:hover:border-brand-700 hover:shadow-md transition-all duration-150 group">
    <div class="flex items-start gap-4">

      <!-- Score ring -->
      <div class="hidden sm:flex flex-col items-center flex-shrink-0 w-12 mt-0.5" title="${scoreTooltip}">
        <div class="relative w-11 h-11">
          <svg class="w-11 h-11 -rotate-90" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="#e2e8f0" stroke-width="3" class="dark:[stroke:#1e293b]"/>
            <circle cx="18" cy="18" r="15.9" fill="none" stroke="currentColor" stroke-width="3"
              stroke-dasharray="${overall} ${100 - overall}" stroke-linecap="round"
              class="${scoreRingClass(overall)}"/>
          </svg>
          <span class="absolute inset-0 flex items-center justify-center text-xs font-bold ${scoreRingClass(overall)}">${overall}</span>
        </div>
      </div>

      <!-- Content -->
      <div class="flex-1 min-w-0">
        <div class="flex flex-wrap items-center gap-2 mb-1.5">
          <span class="badge ${sourceBadgeClass(job.source)}">${src}</span>
          ${notifiedBadge}
          ${actionableBadge}
          ${timelineTag}
        </div>

        <a href="${job.url}" target="_blank" rel="noopener"
          class="text-base font-semibold text-slate-800 dark:text-white group-hover:text-brand-600 dark:group-hover:text-brand-400 transition line-clamp-2 leading-snug">
          ${job.title}
        </a>

        <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-2 text-sm text-slate-500 dark:text-slate-400">
          <span class="flex items-center gap-1">
            <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            <span class="font-medium text-slate-700 dark:text-slate-300">${job.company || companyName || '—'}</span>
          </span>
          ${job.location ? `
          <span class="flex items-center gap-1">
            <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            ${job.location}
          </span>` : ''}
          <span class="flex items-center gap-1">
            <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            ${postedLabel}
          </span>
        </div>
      </div>

      <!-- Arrow -->
      <a href="${job.url}" target="_blank" rel="noopener" class="hidden sm:flex items-center self-center text-slate-300 dark:text-slate-700 group-hover:text-brand-500 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
      </a>
    </div>
  </div>`;
}

// ── Apply filters & re-render ─────────────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const srcFilter = document.getElementById('filter-source').value;
  const actionFilter = document.getElementById('filter-actionable').value;
  const sortBy = document.getElementById('sort-by').value;

  let jobs = ALL_JOBS.filter(j => {
    if (q && !`${j.title} ${j.company}`.toLowerCase().includes(q)) return false;
    if (srcFilter && sourceLabel(j.source) !== srcFilter) return false;
    if (actionFilter === 'actionable' && !j.actionable) return false;
    if (actionFilter === 'notified' && !j.notified) return false;
    return true;
  });

  if (sortBy === 'score') jobs.sort((a, b) => (b.score?.overall ?? 0) - (a.score?.overall ?? 0));
  else if (sortBy === 'company') jobs.sort((a, b) => (a.company || '').localeCompare(b.company || ''));
  else jobs.sort((a, b) => new Date(b.first_seen_time) - new Date(a.first_seen_time));

  const list = document.getElementById('job-list');
  const empty = document.getElementById('empty-state');

  document.getElementById('result-count').textContent = `${jobs.length.toLocaleString()} result${jobs.length !== 1 ? 's' : ''}`;

  if (jobs.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    list.innerHTML = jobs.map(renderCard).join('');
  }
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('jobs.json');
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    window._DAYS_BACK = 14;
    ALL_JOBS = data.jobs || [];

    document.getElementById('loading').classList.add('hidden');
    renderStats(ALL_JOBS, data.exported_at);
    populateSourceFilter(ALL_JOBS);
    applyFilters();
  } catch (err) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error-state').classList.remove('hidden');
    console.error('Failed to load jobs.json', err);
  }
}

init();
</script>
</body>
</html>
