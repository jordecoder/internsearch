name: Kafka Job Consumer

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: kafka-consumer
  cancel-in-progress: false

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  consume:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt -r pipeline/requirements.txt

      - name: Prepare config
        working-directory: backend
        run: cp config.example.yaml config.yaml

      - name: Restore SQLite dedup database
        uses: actions/cache@v4
        with:
          path: backend/jobs.sqlite3
          key: internship-monitor-db-${{ github.run_id }}
          restore-keys: |
            internship-monitor-db-

      - name: Drain Kafka topic and send alerts
        working-directory: backend
        env:
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_API_KEY: ${{ secrets.KAFKA_API_KEY }}
          KAFKA_API_SECRET: ${{ secrets.KAFKA_API_SECRET }}
          KAFKA_SASL_MECHANISM: SCRAM-SHA-256
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m pipeline.run_consumer --drain
