name: Kafka Job Producer

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: kafka-producer
  cancel-in-progress: false

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch jobs but skip publishing to Kafka"
        required: false
        default: false
        type: boolean

jobs:
  produce:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt -r pipeline/requirements.txt

      - name: Prepare config
        working-directory: backend
        run: cp config.example.yaml config.yaml

      - name: Restore SQLite dedup database
        uses: actions/cache@v4
        with:
          path: backend/jobs.sqlite3
          key: internship-monitor-db-${{ github.run_id }}
          restore-keys: |
            internship-monitor-db-

      - name: Publish new jobs to Kafka
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: backend
        env:
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_API_KEY: ${{ secrets.KAFKA_API_KEY }}
          KAFKA_SASL_MECHANISM: SCRAM-SHA-256
          KAFKA_API_SECRET: ${{ secrets.KAFKA_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m pipeline.run_producer

      - name: Dry-run fetch (no publish)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import sys
          from main import load_config, make_client, fetch_all_jobs, configure_logging
          config = load_config()
          configure_logging('INFO')
          client = make_client(config)
          jobs, counts = fetch_all_jobs(config, client)
          print(f'Dry run: fetched {len(jobs)} jobs from {counts}')
          "
