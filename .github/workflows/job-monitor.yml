name: Singapore Internship Job Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: singapore-internship-monitor
  cancel-in-progress: false

on:
  schedule:
    # Every 3 hours in Singapore time, including 20:00 SGT for daily manual links.
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
  workflow_dispatch:
    inputs:
      send_test_message:
        description: "Send a Telegram test message before running the monitor"
        required: false
        default: false
        type: boolean
      send_status_messages:
        description: "Send Telegram start/finish status messages for this manual run"
        required: false
        default: true
        type: boolean

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        id: install
        run: python -m pip install -r requirements.txt

      - name: Prepare config
        id: config
        run: cp config.example.yaml config.yaml

      - name: Send started status
        id: started_status
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_status_messages }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --status-message "Started GitHub Actions monitor run"

      - name: Run tests
        id: tests
        continue-on-error: true
        run: python -m pytest

      - name: Restore SQLite dedupe database
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            jobs.sqlite3
            applications.csv
          key: internship-monitor-db-${{ github.run_id }}
          restore-keys: |
            internship-monitor-db-

      - name: Send Telegram test message
        id: test_message
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_test_message }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --test-telegram

      - name: Handle Telegram commands before run
        id: telegram_commands_before
        if: ${{ vars.ENABLE_ACTIONS_TELEGRAM_COMMANDS == 'true' }}
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --handle-telegram-commands

      - name: Run monitor once
        id: monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --once

      - name: Handle Telegram commands after run
        id: telegram_commands_after
        if: ${{ always() && vars.ENABLE_ACTIONS_TELEGRAM_COMMANDS == 'true' }}
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --handle-telegram-commands

      - name: Send manual run summary
        id: run_summary
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.send_status_messages }}
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --run-summary-message

      - name: Upload application tracker
        id: upload_tracker
        if: ${{ always() && hashFiles('applications.csv') != '' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: applications
          path: applications.csv

      - name: Send finished status
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.send_status_messages }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py --status-message "Finished GitHub Actions monitor run with status: ${{ job.status }} | install=${{ steps.install.outcome }} config=${{ steps.config.outcome }} tests=${{ steps.tests.outcome }} cache=${{ steps.cache.outcome }} monitor=${{ steps.monitor.outcome }} commands_before=${{ steps.telegram_commands_before.outcome }} commands_after=${{ steps.telegram_commands_after.outcome }} summary=${{ steps.run_summary.outcome }} upload=${{ steps.upload_tracker.outcome }}"
