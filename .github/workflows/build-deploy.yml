name: Build & Deploy Frontend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: singapore-internship-monitor
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package*.json'
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'tsconfig*.json'
      - 'postcss.config.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Preserve current jobs.json
        run: |
          git show HEAD:docs/jobs.json > /tmp/jobs.json 2>/dev/null \
            || echo '{"jobs":[],"exported_at":null}' > /tmp/jobs.json

      - name: Build
        run: npm run build

      - name: Restore jobs.json
        run: cp /tmp/jobs.json docs/jobs.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: build frontend [skip ci]"
          git push
