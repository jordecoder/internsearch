log_level: INFO
database_path: jobs.sqlite3
resume_profile_path: resume_profile.yaml
posted_within_hours: 24
check_interval_minutes: 120

heartbeat:
  enabled: true
  interval_hours: 24

near_match_digest:
  enabled: true
  interval_hours: 24
  max_items: 10
  min_overall: 45
  min_location: 35

weekly_summary:
  enabled: true
  interval_hours: 168
  max_companies: 5
  max_missing_keywords: 8

application_tracker:
  enabled: true
  path: applications.csv

http:
  user_agent: "SGInternshipJobMonitor/1.0 (+personal internship alerts)"
  timeout_seconds: 25
  retries: 3
  rate_limit_seconds: 1.5

thresholds:
  overall: 70
  timeline: 80
  location: 70

